name: Retrain Model

on:
  push:

jobs:

  retrain:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5

      with:
        python-version: "3.12"

    - run: |
        pip install mlflow
        pip install pandas
        pip install scikit-learn

    - run: |
        mlflow run MLProject
